<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Attendance - Student List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #68d34d;
            --row-blue: #70c9e8;
            --row-purple: #e381eb;
            --border-color: #bcbcbc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 414px;
            background-color: white;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        /* Header Navigation */
        .header-nav {
            display: flex;
            align-items: center;
            padding: 20px;
        }

        .back-arrow {
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            width: 30px;
        }

        .header-nav h1 {
            flex-grow: 1;
            text-align: center;
            color: var(--primary-green);
            font-size: 1.5rem;
            font-weight: 700;
            margin-right: 30px;
        }

        /* Course Info Header */
        .course-info {
            padding: 0 20px 20px;
            border-bottom: 1px solid #eee;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .course-name {
            text-align: center;
            font-weight: 700;
            font-size: 1.3rem;
            text-transform: uppercase;
        }

        /* Student List Card */
        .list-card {
            border: 1px solid var(--border-color);
            border-radius: 25px;
            margin: 25px 15px;
            padding: 20px 10px;
            flex-grow: 1;
        }

        .list-title {
            text-align: center;
            color: #666;
            font-weight: 400;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* Student Rows */
        .student-row {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            color: #000;
        }

        .blue-bg { background-color: var(--row-blue); }
        .purple-bg { background-color: var(--row-purple); }

        .index {
            font-weight: 700;
            width: 30px;
        }

        .details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .reg-no { font-size: 0.8rem; font-weight: 600; }
        .name { font-size: 1.1rem; font-weight: 700; }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-green);
            border-radius: 3px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .checked::after {
            content: '✓';
            color: var(--primary-green);
            font-weight: bold;
        }

        /* Footer Action */
        .footer {
            padding: 0 20px;
            display: flex;
            justify-content: flex-end;
        }

        .download-btn {
            background-color: var(--primary-green);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <header class="header-nav">
            <div class="back-arrow">＜</div>
            <h1>View Attendance</h1>
        </header>

        <section class="course-info">
            <div class="meta-row">
                <span>CIT123</span>
                <span>23-10-2023 📅</span>
            </div>
            <div class="course-name">Computer Programming</div>
        </section>

        <main class="list-card">
            <h2 class="list-title">Student list</h2>

            <div class="student-row blue-bg">
                <span class="index">1</span>
                <div class="details">
                    <span class="reg-no">ENG-219-132/2024</span>
                    <span class="name">Titus Mwangi</span>
                </div>
                <div class="checkbox checked"></div>
            </div>

            <div class="student-row purple-bg">
                <span class="index">2</span>
                <div class="details">
                    <span class="reg-no">ENG-219-132/2024</span>
                    <span class="name">Rogers Monayo</span>
                </div>
                <div class="checkbox"></div>
            </div>

            <div class="student-row blue-bg">
                <span class="index">3</span>
                <div class="details">
                    <span class="reg-no">ENG-219-132/2024</span>
                    <span class="name">Norman Gichana</span>
                </div>
                <div class="checkbox checked"></div>
            </div>

            <div class="student-row purple-bg">
                <span class="index">4</span>
                <div class="details">
                    <span class="reg-no">ENG-219-132/2024</span>
                    <span class="name">Ezyline Murungi</span>
                </div>
                <div class="checkbox"></div>
            </div>

            <div class="student-row blue-bg">
                <span class="index">5</span>
                <div class="details">
                    <span class="reg-no">ENG-219-132/2024</span>
                    <span class="name">Collins Kipngeno</span>
                </div>
                <div class="checkbox checked"></div>
            </div>
        </main>

        <footer class="footer">
            <button class="download-btn">Download Report</button>
        </footer>
    </div>

</body>
</html>
